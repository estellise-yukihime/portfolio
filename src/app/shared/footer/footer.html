<footer class="border-t border-white/[0.07] mt-10">
  <div class="max-w-shell mx-auto px-8 py-10 flex flex-wrap gap-6 items-center justify-between">
        <span class="font-mono text-[12.5px] text-faint">
          © 2026 Portfolio — A site built for skills & coffee
        </span>
    <div class="flex gap-[22px] font-mono text-[12.5px]">
      @for (p of profileLink; track p.name) {
        <a [href]="p.link" target="_blank" class="text-muted hover:text-content transition-colors">
          {{ p.name }}
        </a>
      }
    </div>
  </div>
</footer>
