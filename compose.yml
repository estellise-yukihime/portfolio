services:
  app:
    image: ghcr.io/estellise-yukihime/portfolio-ui:${VERSION}
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 256M
    ports:
      - "8080:8080"
