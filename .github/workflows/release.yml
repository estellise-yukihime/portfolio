name: release.yml

on:
  release:
    types: [released]

jobs:
  fetch:
    runs-on: desperation
    steps:
      - uses: actions/checkout@v6
      - name: login registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: download image
        continue-on-error: true
        env:
          tag: ${{ github.event.release.tag_name }}
        run: |
          version=${tag#v}
          docker pull ghcr.io/${{ github.repository }}:$version

          if [[ $? -ne 0 ]]; then
            echo "::error failed to download image"
            exit 1
          fi

  retry:
    needs: fetch
    if: ${{ failure() }}
    uses: ./.github/workflows/release-retry.yml

  deploy:
    needs: fetch
    if: ${{ success() }}
    runs-on: desperation
    steps:
      - uses: actions/checkout@v6
      - name: compose up
        run: docker compose up -d

